name: Keep Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - master
    paths:
      - .github/workflows/keep_sync.yml
      - .github/workflows/run_data_sync.yml
      - assets/index.tsx
      - src/**
      - package.json
      - pnpm-lock.yaml

concurrency:
  group: keep-sync-master
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  sync:
    name: Sync Keep Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Sync Keep running data
        run: python run_page/keep_sync.py "${{ secrets.KEEP_MOBILE }}" "${{ secrets.KEEP_PASSWORD }}" --with-gpx

      - name: Generate SVG assets
        run: |
          rm -f assets/github.svg assets/grid.svg assets/mol*.svg assets/year_*.svg assets/year_summary_*.svg assets/github_*.svg

          python run_page/gen_svg.py --from-db --title "Keep Running" --type github --github-style "align-firstday" --athlete "keep" --special-distance 10 --special-distance2 20 --special-color yellow

          python run_page/gen_svg.py --from-db --title "Over 10km Runs" --type grid --athlete "keep" --output assets/grid.svg --special-color yellow --special-color2 red --special-distance 20

          python run_page/gen_svg.py --from-db --type circular --use-localtime

          python run_page/gen_svg.py --from-db --title "Keep Running" --type github --github-style "align-firstday" --athlete "keep" --special-distance 10 --special-distance2 20 --special-color yellow

          python run_page/gen_svg.py --from-db --type year_summary --output assets/year_summary.svg --athlete "keep"

          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol.svg --use-localtime --athlete "keep"

          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_running.svg --use-localtime --athlete "keep"

          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_walking.svg --use-localtime --athlete "keep"

          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_cycling.svg --use-localtime --athlete "keep"

      - name: Push new runs
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'

          git add .

          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi

          git commit -m 'update keep runs'

          for i in 1 2 3; do
            echo "Push attempt $i"

            git fetch origin master

            if git rebase origin/master; then
              if git push origin HEAD:master; then
                echo "push success"
                exit 0
              fi
            else
              echo "rebase conflict"
              git rebase --abort || true
              exit 1
            fi

            sleep 5
          done

          echo "push failed after retries"
          exit 1

  publish_github_pages:
    name: Build and publish GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - sync

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest data
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Use latest master
        run: |
          git fetch origin master
          git checkout --force origin/master

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack and pnpm
        run: |
          npm install -g corepack@latest
          corepack enable

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: PATH_PREFIX=/$REPO_NAME pnpm build

      - name: Inspect build output
        run: |
          echo "Checking ./dist"

          if [ ! -d "./dist" ]; then
            echo "ERROR: ./dist not found. Build failed or output path changed."
            echo "Workspace contents:"
            ls -la
            exit 1
          fi

          echo "Found ./dist, listing contents:"
          ls -la ./dist
          du -sh ./dist || true

          echo "First files in ./dist:"
          find ./dist -maxdepth 2 -type f | head -50

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: ./dist
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

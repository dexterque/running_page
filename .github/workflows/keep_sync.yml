name: Keep Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - master
    paths:
      - .github/workflows/keep_sync.yml
      - .github/workflows/run_data_sync.yml
      - assets/index.tsx
      - src/**
      - package.json
      - pnpm-lock.yaml

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Keep running data
        run: python run_page/keep_sync.py "${{ secrets.KEEP_MOBILE }}" "${{ secrets.KEEP_PASSWORD }}" --with-gpx

      - name: Generate SVG assets
        run: |
          rm -f assets/github.svg assets/grid.svg assets/mol*.svg assets/year_*.svg assets/year_summary_*.svg assets/github_*.svg
          python run_page/gen_svg.py --from-db --title "Keep Running" --type github --github-style "align-firstday" --athlete "keep" --special-distance 10 --special-distance2 20 --special-color yellow --special-color2 red --output assets/github.svg --use-localtime --min-distance 0.5
          python run_page/gen_svg.py --from-db --title "Over 10km Runs" --type grid --athlete "keep" --output assets/grid.svg --special-color yellow --special-color2 red --special-distance 20 --special-distance2 40 --use-localtime --min-distance 10
          python run_page/gen_svg.py --from-db --type circular --use-localtime
          python run_page/gen_svg.py --from-db --title "Keep Running" --type github --github-style "align-firstday" --athlete "keep" --special-distance 10 --special-distance2 20 --special-color yellow --special-color2 red --output assets/github.svg --use-localtime --min-distance 0.5 --generate-all-years
          python run_page/gen_svg.py --from-db --type year_summary --output assets/year_summary.svg --athlete "keep"
          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol.svg --use-localtime --athlete "keep" --title "Month of Life" --sport-type all
          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_running.svg --use-localtime --athlete "keep" --title "Runner Month of Life" --sport-type running
          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_walking.svg --use-localtime --athlete "keep" --title "Walker Month of Life" --sport-type walking
          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_hiking.svg --use-localtime --athlete "keep" --title "Hiker Month of Life" --sport-type hiking
          python run_page/gen_svg.py --from-db --type monthoflife --birth 1990-01 --special-color "#f9d367" --special-color2 "#f0a1a8" --output assets/mol_cycling.svg --use-localtime --athlete "keep" --title "Cyclist Month of Life" --sport-type cycling

      - name: Push new runs
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add .
          git commit -m 'update keep runs' || echo 'nothing to commit'
          git push || echo 'nothing to push'

  publish_github_pages:
    name: Build and publish Github Pages
    runs-on: ubuntu-latest
    needs:
      - sync
    steps:
      - name: Checkout latest data
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Use latest master
        run: |
          git fetch origin master
          git checkout --force origin/master

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: npm install -g corepack@latest && corepack enable pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: PATH_PREFIX=/$REPO_NAME pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
